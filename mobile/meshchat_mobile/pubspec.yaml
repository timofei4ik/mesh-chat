name: meshchat_mobile
description: "MeshChat mobile client."
publish_to: "none"
version: 0.1.1+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cryptography: ^2.7.0
  file_picker: ^10.3.7
  image_picker: ^1.2.1
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
