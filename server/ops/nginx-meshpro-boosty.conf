# Add these locations inside the existing HTTPS server block for
# meshchat-losa.ru. Keep them outside the PWA cookie gate.

location = /meshpro/activate {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /meshpro/activate/ {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /meshpro/activate.js {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /meshpro/styles.css {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /meshpro/logo.png {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /billing/boosty/info {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /billing/boosty/activate {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 4k;
}
