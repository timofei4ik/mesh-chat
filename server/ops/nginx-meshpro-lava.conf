# Add these locations inside the existing HTTPS server block for
# meshchat-losa.ru. Keep them outside the PWA cookie gate.

location = /meshpro {
    auth_basic off;
    return 308 /meshpro/;
}

location ^~ /meshpro/ {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /billing/offer {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location = /billing/checkout {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 4k;
}

location = /billing/lava/webhook {
    auth_basic off;
    access_log off;
    proxy_pass http://127.0.0.1:8766;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 64k;
}

location = /billing/payment-complete {
    auth_basic off;
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
}
